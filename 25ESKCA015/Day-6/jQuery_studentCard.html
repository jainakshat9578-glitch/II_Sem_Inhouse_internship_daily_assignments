<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="bg-dark text-light">
    <div class="container py-5">
        <h2 class="text-center mb-4">Student Records</h2>
        <input type="text" id="search" class="form-control mb-4" placeholder="Search Student">
        <div id="container" class="row g-4"></div>
        `
    </div>
    
    <script>

        const students = [
            { name: "Akshat", branch: "CSE", cgpa:10 },
            { name: "Arihant", branch: "CSE", cgpa:9.9 },
            { name: "Kushagra", branch: "CSE", cgpa:9.8 },
            { name: "Aaditya", branch: "CSE", cgpa:9.7 },
            { name: "Aarish", branch: "CSE", cgpa:9.6 },
            { name: "Abhishek", branch: "CSE", cgpa:9.5 },
            { name: "Anurag", branch: "CSE", cgpa:9.4 },
            { name: "Ankit", branch: "CSE", cgpa:9.3 },
            { name: "Bhavya", branch: "CSE", cgpa:9.2 }
        ];

        let html = "";

        for(let i=0; i<students.length; i++){
            html += `
            <div class="col-md-4 card-item">
                <div class="card-shadow">
                    <div class="card-body">
                        <h4>${students[i].name}</h4>
                        <button class="btn btn-primary btn-sm mt-2">
                            Show Details 
                            </button>

                            <div class="details mt-3" style="display:none;">
                                <p><strong>Branch:</strong> ${students[i].branch}</p>
                                <p><strong>CGPA:</strong> ${students[i].cgpa}</p>    
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        document.getElementById("container").innerHTML = html;

// show hide details on button click
        $(document).on("click", ".btn", function(){
            $(this).next(".details").slideToggle();
        })

        //close all other cards
        $(document).on("click", ".btn", function(){
           $(this).next(".details").slideUp();
        })

        // search functionality
        $("#search").keyup(function(){
            let val = $(this).val().toLowerCase();
            $(".card-item").each(function(){
                let name = $(this).find("h4").text().toLowerCase()

                if(name.includes(val)){
                    $(this).show();
                } else {
                    $(this).hide();
                }
            });
        });

    </script>
</body>
</html>
