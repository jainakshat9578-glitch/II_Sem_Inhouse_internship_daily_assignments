<html lang="en">

    <script>
        fetch("https://jsonplaceholder.typicode.com/users")
        .then(res=>res.json())
        .then(data =>{
            console.log(data)
            let names = data.map(user=>user.name)
            console.log(names)
            let usernames = data.map(user=>user.username)
            console.log(usernames)
            let emails = data.map(user=>user.email)
            console.log(emails)
        })
    </script>
